<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1b1b1b;
            color: #f5f5f5;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            padding: 40px 20px;
            background-color: #2c2c2c;
        }
        header img {
            height: 80px;
            margin: 0 10px;
        }
        h1 {
            margin: 20px 0 10px 0;
            font-size: 2.5em;
        }
        p {
            font-size: 1.2em;
            max-width: 800px;
            margin: 0 auto 20px auto;
        }
        .badges img {
            margin: 5px;
            vertical-align: middle;
        }
        .buttons a {
            display: inline-block;
            padding: 12px 24px;
            margin: 10px;
            background-color: #4b4bff;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .buttons a:hover {
            background-color: #6b6bff;
        }
        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9em;
            color: #aaa;
        }
    </style>
</head>
<body>

<header>
    <img src="icon.png" alt="Logo">
    <img src="title.png" alt="Title">
    <h1>Signal Menu</h1>
    <p>
        A feature-packed mod menu for Gorilla Tag, built by 
        <a href="https://github.com/epicmann211" style="color:#4b4bff;">nedus31gt</a>. 
        Customize your VR experience and explore mods safely in your own projects.
    </p>
</header>

<div class="badges">
    <!-- Version badge -->
    <a href="https://github.com/epicmann211/SignalMenu/releases/latest">
        <img src="https://img.shields.io/github/v/release/epicmann211/SignalMenu?style=for-the-badge&label=Version" alt="Latest Version">
    </a>

    <!-- Static Download badge -->
    <a href="https://github.com/epicmann211/SignalMenu/releases/latest">
        <img src="https://img.shields.io/badge/Download-Latest-blue?style=for-the-badge&logo=github" alt="Download Latest">
    </a>

    <!-- Discord badge -->
    <a href="https://discord.gg/YOURDISCORDLINK">
        <img src="https://img.shields.io/badge/Discord-Join-blueviolet?style=for-the-badge&logo=discord" alt="Discord">
    </a>

    <!-- MIT License badge -->
    <a href="https://opensource.org/licenses/MIT">
        <img src="https://img.shields.io/badge/License-MIT-green?style=for-the-badge" alt="MIT License">
    </a>
</div>

<div class="buttons">
    <a href="https://github.com/epicmann211/SignalMenu/releases/latest" target="_blank">Download Latest</a>
    <a href="https://github.com/epicmann211/SignalMenu" target="_blank">View Source</a>
    <a href="https://discord.gg/YOURDISCORDLINK" target="_blank">Join Discord</a>
</div>

<footer>
    &copy; 2026 Signal Menu Project. All rights reserved.<br>
    Licensed under the MIT License.
</footer>

</body>
</html>
